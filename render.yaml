# Render Blueprint - Bent w Weld
# Deploy both services at once via Render Dashboard > New > Blueprint

services:
  # Backend - NestJS + Socket.IO
  - type: web
    name: bentweld-backend
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false  # Set this manually after deploying frontend
    healthCheckPath: /

  # Frontend - Next.js
  - type: web
    name: bentweld-frontend
    runtime: node
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false  # Set this to your backend URL after deploying
      - key: PORT
        value: 3000
